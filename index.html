<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Petra Canyon Hotel</title>
    <meta
      http-equiv="refresh"
      content="2; url=https://t3h3a.github.io/Petra-Canyon-Hotel/"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #140f0d;
        --bg-2: #38231b;
        --accent: #d8a06c;
        --text: #f8f2eb;
        --muted: rgba(248, 242, 235, 0.72);
        --card: rgba(255, 255, 255, 0.08);
        --border: rgba(255, 255, 255, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(circle at top, rgba(216, 160, 108, 0.2), transparent 28%),
          radial-gradient(circle at bottom left, rgba(174, 95, 62, 0.18), transparent 30%),
          linear-gradient(145deg, var(--bg) 0%, var(--bg-2) 100%);
        color: var(--text);
      }

      .card {
        width: min(680px, 100%);
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 40px 32px;
        background: var(--card);
        backdrop-filter: blur(14px);
        box-shadow: 0 32px 90px rgba(0, 0, 0, 0.28);
        text-align: center;
      }

      .eyebrow {
        margin: 0;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.36em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 18px 0 12px;
        font-family: "Playfair Display", Georgia, serif;
        font-size: clamp(2.2rem, 5vw, 4rem);
        line-height: 1.06;
      }

      p {
        margin: 0 auto;
        max-width: 42rem;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.9;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin-top: 28px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 210px;
        border-radius: 999px;
        padding: 14px 22px;
        font-weight: 700;
        text-decoration: none;
        transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
      }

      .button:hover {
        transform: translateY(-1px);
      }

      .button.primary {
        background: #fff;
        color: #5c3427;
      }

      .button.secondary {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .small {
        margin-top: 18px;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Petra Canyon Hotel</p>
      <h1>Redirecting To The Live Hotel Site</h1>
      <p>
        This repository root is not the hotel frontend itself. You will be redirected to the deployed
        Petra Canyon Hotel website automatically.
      </p>

      <div class="actions">
        <a class="button primary" href="https://t3h3a.github.io/Petra-Canyon-Hotel/">Open Live Website</a>
        <a class="button secondary" href="artifacts/petra-canyon-hotel/">Open App Source Folder</a>
      </div>

      <p class="small">If the redirect does not start, use the button above.</p>
    </main>
  </body>
  </html>
